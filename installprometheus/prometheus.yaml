---
- name: installing prometheus on rhel
  hosts: rhel
  become: true

  vars:
    prometheus_version: "3.5.3"
    prometheus_user: prometheus
    prometheus_download_url: "https://github.com/prometheus/prometheus/releases/download/v3.4.1/prometheus-3.5.3.linux-amd64.tar.gz"

  tasks:


    - name: creating prometheus user
      user:
        name: "{{prometheus_user}}"
        system: yes
        create_home: no
        shell: /bin/false

    - name: Download prometheus
      get_url:
        url: "{{prometheus_download_url}}"
        dest: /tmp/prometheus.tar.gz

    - name: Extract prometheus tar file
      unarchive:
        src: /tmp/prometheus.tar.gz
        dest: /tmp
        #below key tells tar file is availble in remote host(if flag is yes) not on local 
        remote_src: yes 

    - name: create prometheus directories in etc and var/lib
      file:
        path: "{{item}}"
        state: directory
        owner: "{{prometheus_user}}"
        group: "{{prometheus_user}}"
        mode: '0755'
      loop:
        - /etc/prometheus
        - /var/lib/prometheus

    - name: copy xtracted binary to /usr/local/bin , like adding as environment, but prometheus folder will be created auto during copy
      copy:
        src: "/tmp/prometheus-{{prometheus_version}}.linux-amd64/prometheus"
        dest: /usr/local/bin/prometheus
        owner: "{{prometheus_user}}"
        group: "{{prometheus_user}}"
        mode: '0755'
        remote_src: yes

    - name:  copy xtracted binary prom tool to /usr/local/bin , like adding as environment, but prometheus folder will be created auto during copy  
      copy:
        src: "/tmp/prometheus-{{prometheus_version}}.linux-amd64/promtool"
        dest: /usr/local/bin/promtool
        owner: "{{prometheus_user}}"
        group: "{{prometheus_user}}"
        mode: '0755'
        remote_src: yes

    - name: Configure prometheus yaml
      copy:
       dest: /etc/prometheus/prometheus.yml
       owner: "{{prometheus_user}}"
       group: "{{prometheus_user}}"    
       mode: '0644'
       content: |
         global:
            scrape_interval: 15s

          scrape_configs:
            - job_name: "prometheus"
              static_configs:
                - targets: ["localhost:9090"]

            - job_name: "linux-servers"
              static_configs:
                - targets:
                    - "TARGET1_PRIVATE_IP:9100"
                    - "TARGET2_PRIVATE_IP:9100"
    - name: Allow Prometheus port
      firewalld:
        port: 9090/tcp
        permanent: true
        state: enabled

    - name: Allow Node Exporter port
      firewalld:
        port: 9100/tcp
        permanent: true
        state: enabled

    - name: Reload firewalld
      service:
        name: firewalld
        state: reloaded

    - name: create a systemd service file
      copy:
        dest: /etc/systemd/system/prometheus.service
        mode: '0644'
        content: |
          [Unit]
          Description=Prometheus
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=prometheus
          Group=prometheus
          Type=simple

          ExecStart=/usr/local/bin/prometheus \
            --config.file=/etc/prometheus/prometheus.yml \
            --storage.tsdb.path=/var/lib/prometheus

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Enable Prometheus service
      systemd:
        name: prometheus
        enabled: yes

    - name: Start Prometheus service
      systemd:
        name: prometheus
        state: started

    - name: Verify Prometheus service
      command: systemctl status prometheus
      register: prometheus_status

    - name: Display service status
      debug:
        var: prometheus_status.stdout                      